server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión Gzip de alto nivel
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml font/woff2;

    # Cabeceras de seguridad básicas
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Caché inmutable de 1 año para assets estáticos compilados (JS, CSS e imágenes procesadas)
    location ^~ /_astro/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Caché prolongada para tipografías y recursos gráficos
    location ~* \.(woff2?|png|jpg|jpeg|gif|ico|svg|webp|avif|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Documentos HTML: Sin caché local para actualizar el sitio inmediatamente en cada deploy
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # URLs limpias y manejo de error 404
    location / {
        try_files $uri $uri/ $uri.html /404.html =404;
    }

    error_page 404 /404.html;
}
